id: "eu-russia"
name: "Russia-Europe Direct Conflict Escalation"
description: |
  Tracks escalation risk from hybrid and proxy confrontation into direct military
  conflict between Russia and European NATO states.

baseline_probability: 0.08
decay_half_life_days: 30
forecast_contract:
  question: "Will direct military conflict involving Russia and one or more European NATO states occur by 2030-12-31?"
  horizon:
    kind: "fixed_date"
    fixed_date: 2030-12-31
  resolution_basis: "Binary event question resolved against attributable direct state-on-state hostilities, excluding proxy-only or cyber-only confrontation."
  resolver_source: "Official state and alliance statements plus multi-source corroborated reporting."
  resolver_basis: "Resolve yes on confirmed direct hostilities; otherwise resolve no at the horizon."
  closure_rule: "binary_event_by_horizon"
  occurrence_definition: "Confirmed direct combat engagement between Russian forces and one or more European NATO member-state forces."
  non_occurrence_definition: "No confirmed direct combat engagement between Russian forces and one or more European NATO member-state forces by the horizon date."

disqualifiers:
  - signal: "binding_peace_treaty"
    effect: "reset_to_baseline"
    description: "Ratified multi-party peace treaty with verification regime"
  - signal: "durable_force_separation"
    effect: "reassess"
    description: "Verified force separation and deconfliction architecture"

falsification_criteria:
  decrease_confidence:
    - "No high-severity military incidents for 9+ months"
    - "Restored military hotlines with regular joint deconfliction"
    - "Sustained diplomatic normalization with sanctions rollback"
  increase_confidence:
    - "Deadly direct incident involving NATO personnel"
    - "Rapid force mobilization near NATO frontier"
    - "Official rhetoric indicating imminent confrontation"
  would_invalidate_model:
    - "Major alliance collapse or withdrawal of core actors"

indicators:
  military_movement:
    weight: 0.05
    direction: escalatory
    type: leading
    description: "Force repositioning, reinforcement, or readiness changes near NATO or contested borders without confirmed hostile contact."
    keywords: ["troop buildup", "deployment", "reinforcement", "forward posture"]

  military_incident:
    weight: 0.06
    direction: escalatory
    type: leading
    description: "Direct hostile or dangerous encounter such as an airspace violation, fired-upon aircraft, naval collision, or intercept with concrete incident details."
    keywords: ["airspace violation", "naval collision", "fired upon", "intercept"]

  weapons_transfer:
    weight: 0.04
    direction: escalatory
    type: leading
    description: "Delivery or approval of weapons systems, munitions, or long-range strike capabilities to actors in the theater."
    keywords: ["long-range systems", "arms package", "munition transfer"]

  nuclear_rhetoric:
    weight: 0.04
    direction: escalatory
    type: leading
    description: "Official statements or posture changes invoking nuclear readiness, deterrence, or strategic forces."
    keywords: ["nuclear posture", "strategic deterrence", "nuclear readiness"]

  cyber_infrastructure_attack:
    weight: 0.03
    direction: escalatory
    type: leading
    description: "Cyber or hybrid attack disrupting critical infrastructure such as power, telecoms, transport, GPS, or undersea cables."
    keywords: ["critical infrastructure attack", "power grid disruption", "undersea cable sabotage", "GPS jamming"]

  diplomatic_breakdown:
    weight: 0.03
    direction: escalatory
    type: lagging
    description: "Suspension or collapse of diplomatic channels, expulsions, or formal termination of talks."
    keywords: ["expelled diplomats", "suspended talks", "severed channels"]

  ceasefire:
    weight: 0.04
    direction: de_escalatory
    type: lagging
    description: "Verified halt or reduction in hostilities under a truce, ceasefire, or cessation agreement."
    keywords: ["ceasefire", "truce", "cessation of hostilities"]

  diplomatic_talks:
    weight: 0.04
    direction: de_escalatory
    type: leading
    description: "Active negotiation, summit, hotline, or deconfliction talks aimed at reducing confrontation."
    keywords: ["peace talks", "summit", "negotiation", "deconfliction"]

regions:
  - Eastern Europe
  - Baltic region
  - Black Sea
  - Arctic
  - Scandinavia

actors:
  - Russia
  - NATO
  - European Union
  - United States
  - Poland
  - Baltic States
  - Finland
  - Germany

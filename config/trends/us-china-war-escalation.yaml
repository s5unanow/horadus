id: "us-china"
name: "US-China Direct War Escalation"
description: |
  Tracks escalation from strategic competition into direct military conflict,
  especially around Taiwan and contested maritime zones.

baseline_probability: 0.09
decay_half_life_days: 30
forecast_contract:
  question: "Will direct military conflict involving the United States and China occur by 2030-12-31?"
  horizon:
    kind: "fixed_date"
    fixed_date: 2030-12-31
  resolution_basis: "Binary event question resolved against attributable direct state-on-state hostilities, excluding proxy-only confrontation."
  resolver_source: "Official state statements plus multi-source corroborated reporting."
  resolver_basis: "Resolve yes on confirmed direct hostilities; otherwise resolve no at the horizon."
  closure_rule: "binary_event_by_horizon"
  occurrence_definition: "Confirmed direct combat engagement between United States and Chinese state forces."
  non_occurrence_definition: "No confirmed direct combat engagement between United States and Chinese state forces by the horizon date."

disqualifiers:
  - signal: "binding_crisis_stabilization_framework"
    effect: "reset_to_baseline"
    description: "Verified bilateral military crisis-stabilization agreement"
  - signal: "long_horizon_deterrence_compact"
    effect: "reassess"
    description: "Durable deterrence and communication compact"

falsification_criteria:
  decrease_confidence:
    - "No major military incidents in Taiwan theater for 12 months"
    - "Regular high-level military dialogue and confidence mechanisms"
  increase_confidence:
    - "Maritime or air incident with casualties"
    - "Sustained partial blockade behavior around Taiwan"
  would_invalidate_model:
    - "Formal political settlement redefining Taiwan status"

indicators:
  taiwan_blockade_activity:
    weight: 0.06
    direction: escalatory
    type: leading
    description: "Quarantine, inspection, blockade, or shipping restrictions around Taiwan that constrain normal access."
    keywords: ["blockade", "inspection zone", "shipping disruption around taiwan", "quarantine"]

  military_incident:
    weight: 0.06
    direction: escalatory
    type: leading
    description: "Concrete air or maritime encounter with collision, firing, or casualties involving US, Chinese, or allied forces."
    keywords: ["collision", "fired upon", "close encounter", "casualties"]

  pla_exercise_escalation:
    weight: 0.05
    direction: escalatory
    type: leading
    description: "Expansion or intensification of PLA drills, live fire, encirclement, or exercise tempo around Taiwan."
    keywords: ["military exercises", "live fire drill", "joint exercise around taiwan", "encirclement drill", "PLA exercise surge"]

  alliance_force_posture_upgrade:
    weight: 0.04
    direction: escalatory
    type: leading
    description: "Operational increase in allied deployments, missions, or deterrence posture in the theater."
    keywords: ["force posture", "forward deployment", "deterrence mission"]

  export_control_spiral:
    weight: 0.03
    direction: escalatory
    type: lagging
    description: "Escalating trade or technology restrictions such as chip controls, rare earth limits, or related retaliatory measures."
    keywords: ["chip restrictions", "export control expansion", "rare earth controls"]

  high_level_military_talks:
    weight: 0.04
    direction: de_escalatory
    type: leading
    description: "Senior military-to-military dialogue, hotlines, or confidence-building talks meant to stabilize tensions."
    keywords: ["defense talks", "military hotline", "confidence building"]

  maritime_rules_of_engagement:
    weight: 0.03
    direction: de_escalatory
    type: lagging
    description: "Formal protocols or agreements that lower the risk of incidents at sea or in the air."
    keywords: ["rules of engagement", "incident prevention at sea"]

regions:
  - Taiwan Strait
  - South China Sea
  - East China Sea
  - Western Pacific

actors:
  - United States
  - China
  - Taiwan
  - Japan
  - Philippines
  - Australia
  - AUKUS
